name: cuentas_claras
description: "CuentasClaras - Gestión de inventario para pequeños negocios."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  lottie: ^3.1.0
  flutter_local_notifications: ^17.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  mobile_scanner: ^5.1.1
  path_provider: ^2.1.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
