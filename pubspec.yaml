name: cuentas_claras
description: "CuentasClaras - Gestión de inventario para pequeños negocios."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1

  # Backend
  supabase_flutter: ^2.5.6

  # Navegación y estado
  go_router: ^14.2.0
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Funcionalidades
  mobile_scanner: ^5.1.1
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.0

  # PDF y compartir
  pdf: ^3.11.1
  share_plus: ^10.0.0
  path_provider: ^2.1.4

  # Utilidades
  intl: ^0.20.2
  uuid: ^4.4.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2D5A40"
  adaptive_icon_foreground: "assets/images/logo.png"